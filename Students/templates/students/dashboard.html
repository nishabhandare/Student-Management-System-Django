{% extends 'base.html' %}

{% block content %}

<div class="text-center mb-4">
    <h2>📊 Dashboard</h2>
    <h5>Welcome, {{ request.user.username }}</h5>
</div>
<div class="row">
    <div class="col-md-6 mb-3">
        <div class="card bg-primary text-white shadow">
            <div class="card-body text-center">
                <h5>Total Students</h5>
                <h2>{{ total_students }}</h2>
            </div>
        </div>
    </div>
    <div class="col-md-6 mb-3">
        <div class="card bg-success text-white shadow">
            <div class="card-body text-center">
                <h5>My Students</h5>
                <h2>{{ my_students }}</h2>
            </div>
        </div>
    </div>
</div>
<div class="row mt-4">
    <div class="col-md-4 mb-3">
        <a href="{% url 'view_students' %}" class="btn btn-primary w-100 p-3">
            👁 View Students
        </a>
    </div>
    <div class="col-md-4 mb-3">
        <a href="{% url 'add_student' %}" class="btn btn-success w-100 p-3">
            ➕ Add Student
        </a>
    </div>
    <div class="col-md-4 mb-3">
        <a href="{% url 'search_student' %}" class="btn btn-warning w-100 p-3">
            🔍 Search Student
        </a>
    </div>
</div>
{% endblock %}
